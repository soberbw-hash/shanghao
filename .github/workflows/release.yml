name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - shell: bash
        run: bash -n scripts/deploy-relay-ubuntu.sh
      - run: pnpm release:verify
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:five-peer-audio
      - run: pnpm build
      - run: pnpm dist:win
      - run: pnpm release:verify-package
      - run: pnpm release:checksums
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml
            apps/desktop/release/SHA256SUMS.txt

  publish:
    needs: [windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          body_path: docs/release-notes/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          files: |
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/latest*.yml
            artifacts/SHA256SUMS.txt

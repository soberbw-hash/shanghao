appId: com.sober.shanghao
productName: 上号
artifactName: ShangHao-Setup.${ext}
asar: true
directories:
  output: release
  buildResources: build
files:
  - "dist/**"
  - "dist-electron/**"
  - "package.json"
extraMetadata:
  name: shanghao
  main: dist-electron/main/index.cjs
win:
  icon: icon.ico
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerHeaderIcon: icon.ico

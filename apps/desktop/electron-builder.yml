appId: com.sober.shanghao
productName: "上号"
publish:
  provider: github
  owner: soberbw-hash
  repo: shanghao
generateUpdatesFilesForAllChannels: true
asar: true
npmRebuild: false
asarUnpack:
afterPack: ../../scripts/after-pack.cjs
directories:
  output: release
  buildResources: build
files:
  - "dist/**"
  - "dist-electron/**"
  - "!dist/**/*.map"
  - "!dist-electron/**/*.map"
  - "!node_modules/**/*.map"
  - "package.json"
extraResources:
  - from: ../../THIRD_PARTY_NOTICES.md
    to: licenses/THIRD_PARTY_NOTICES.md
  - from: node_modules/@shiguredo/rnnoise-wasm/LICENSE
    to: licenses/rnnoise-wasm-APACHE-2.0.txt
  - from: ../../licenses/RNNOISE-BSD.txt
    to: licenses/RNNOISE-BSD.txt
  - from: node_modules/@fontsource-variable/noto-sans-sc/LICENSE
    to: licenses/NotoSansSC-OFL-1.1.txt
  - from: build
    to: build
    filter:
      - "shanghao-icon.icns"
      - "shanghao-icon-v3.ico"
      - "shanghao-shortcut-v3.ico"
      - "tray-dark.png"
      - "tray-light.png"
extraMetadata:
  name: shanghao
  main: dist-electron/main/index.cjs

mac:
  category: public.app-category.social-networking
  icon: shanghao-icon.icns
  artifactName: ShangHao-${version}-mac-${arch}.${ext}
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

win:
  executableName: ShangHao
  icon: shanghao-icon-v3.ico
  artifactName: ShangHao-${version}-Setup-${arch}.${ext}
  electronLanguages:
    - zh-CN
    - en-US
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  shortcutName: "上号"
  installerIcon: shanghao-icon-v3.ico
  uninstallerIcon: shanghao-icon-v3.ico
  installerHeaderIcon: shanghao-icon-v3.ico

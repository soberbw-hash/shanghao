appId: com.sober.shanghao
productName: "上号"
artifactName: ShangHao-${version}-${arch}.${ext}
asar: true
directories:
  output: release
  buildResources: build
files:
  - "dist/**"
  - "dist-electron/**"
  - "package.json"
extraResources:
  - from: build
    to: build
    filter:
      - "shanghao-icon.icns"
      - "shanghao-icon-xl.ico"
      - "shanghao-shortcut-xl.ico"
      - "tray-dark.png"
      - "tray-light.png"
extraMetadata:
  name: shanghao
  main: dist-electron/main/index.cjs

mac:
  category: public.app-category.social-networking
  icon: shanghao-icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

win:
  executableName: ShangHao
  icon: shanghao-icon-xl.ico
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  shortcutName: "上号"
  installerIcon: shanghao-icon-xl.ico
  uninstallerIcon: shanghao-icon-xl.ico
  installerHeaderIcon: shanghao-icon-xl.ico

appId: com.sober.shanghao
productName: "\u4E0A\u53F7"
artifactName: ShangHao-Setup.${ext}
asar: true
directories:
  output: release
  buildResources: build
files:
  - "dist/**"
  - "dist-electron/**"
  - "package.json"
extraResources:
  - from: build
    to: build
    filter:
      - "shanghao-icon-xl.ico"
      - "shanghao-shortcut-xl.ico"
      - "tray-dark.png"
      - "tray-light.png"
extraMetadata:
  name: shanghao
  main: dist-electron/main/index.cjs
win:
  executableName: ShangHao
  icon: shanghao-icon-xl.ico
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  shortcutName: "\u4E0A\u53F7"
  installerIcon: shanghao-icon-xl.ico
  uninstallerIcon: shanghao-icon-xl.ico
  installerHeaderIcon: shanghao-icon-xl.ico

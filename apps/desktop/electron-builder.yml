appId: com.sober.shanghao
productName: "上号"
publish:
  provider: github
  owner: soberbw-hash
  repo: shanghao
generateUpdatesFilesForAllChannels: true
asar: true
afterPack: ../../scripts/after-pack.cjs
directories:
  output: release
  buildResources: build
files:
  - "dist/**"
  - "dist-electron/**"
  - "package.json"
extraResources:
  - from: build
    to: build
    filter:
      - "shanghao-icon.icns"
      - "shanghao-icon-v3.ico"
      - "shanghao-shortcut-v3.ico"
      - "tray-dark.png"
      - "tray-light.png"
extraMetadata:
  name: shanghao
  main: dist-electron/main/index.cjs

mac:
  category: public.app-category.social-networking
  icon: shanghao-icon.icns
  artifactName: ShangHao-${version}-mac-${arch}.${ext}
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

win:
  executableName: ShangHao
  icon: shanghao-icon-v3.ico
  artifactName: ShangHao-${version}-Setup-${arch}.${ext}
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  shortcutName: "上号"
  installerIcon: shanghao-icon-v3.ico
  uninstallerIcon: shanghao-icon-v3.ico
  installerHeaderIcon: shanghao-icon-v3.ico
